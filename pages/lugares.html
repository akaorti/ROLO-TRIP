<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lugares — Bogotá Oculta</title>
  
  <link rel="stylesheet" href="../css/styles.css" />
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  </head>
<body style="background-color: #0e0e0e;">

  <header class="navbar">
  <div class="navbar__logo"><a href="../index.html">Bogotá <span>Oculta</span></a></div>

  <nav class="navbar__links">
    <a href="../index.html#explorar" data-i18n="navExplore">Explorar</a>
    <a href="mapa.html" data-i18n="navMap">Mapa</a>
    <a href="lugares.html" data-i18n="navPlaces">Lugares</a>
    <a href="../index.html#tips" data-i18n="navTips">Tips</a>
  </nav>

  <div class="lang-toggle">
    <button class="lang-btn active" id="btn-es">ES</button>
    <button class="lang-btn" id="btn-en">EN</button>
  </div>

  <button class="hamburger" id="hamburger" aria-label="Menú">
    <span></span><span></span><span></span>
  </button>
</header>

  <main style="margin-top: 120px; padding-bottom: 5rem;">
    <section class="section-header" style="text-align: center; margin-bottom: 3rem;">
      <p class="section-label" style="color: #c9a96e; letter-spacing: 0.2em; text-transform: uppercase; font-size: 0.75rem;">Guía Completa</p>
      <h1 class="section-title" style="font-family: 'Playfair Display', serif; color: white; font-size: 3rem;">Todos los Lugares</h1>
    </section>

    <div class="filters-container" style="max-width: 1100px; margin: 0 auto 3rem; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; padding: 0 20px;">
      <button class="btn-filter active" data-cat="todos">Todos</button> 
      <button class="btn-filter" data-cat="sabores">Sabores Ocultos</button>
      <button class="btn-filter" data-cat="arte">Arte Urbano</button>
      <button class="btn-filter" data-cat="naturaleza">Naturaleza Escondida</button>
      <button class="btn-filter" data-cat="barrios">Barrios Emergentes</button>
      <button class="btn-filter" data-cat="noche">Planes Nocturnos</button>
      <button class="btn-filter" data-cat="mercados">Mercados y Plazas</button>
      <button class="btn-filter" data-cat="cafe">Café Local</button>
    </div>

    <div class="places-grid" id="placesGrid" style="max-width: 1100px; margin: 0 auto; padding: 0 20px;">
      </div>
  </main>

  <script src="../js/main.js"></script>

</body>
</html>
